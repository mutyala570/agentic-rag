paths:
  pdfs: "pdfs"
  markdown: "data/markdown"
  chunks: "data/chunks"
  processed: "data/processed"
  vectors: "data/vectors"
  vectorstores: "vectorstores"
  temp_uploads: "temp_uploads"

  annotated_chunks: "data/processed/annotated_chunks.jsonl"
  vectors_file: "data/vectors.pkl"

  chroma_path: "vectorstores/chroma"

  bm25_index: "vectorstores/bm25.pkl"
  bm25_metadata: "vectorstores/bm25_metadata.pkl"


models:
  embedding:
    name: "sentence-transformers/all-MiniLM-L6-v2"

  reranker:
    name: "cross-encoder/ms-marco-MiniLM-L-6-v2"

  llm:
    default: "llama-3.3-70b-versatile"
    alternatives:
      - "llama-3.1-8b-instant"
      - "mixtral-8x7b-32768"

  eval:
    name: "google/flan-t5-base"

document_processing:
  chunk_size: 512
  min_chunk_chars: 100
  default_llm: "llama-3.3-70b-versatile"

embedding:
  batch_size: 512
  checkpoint_dir: "data/vectors"

search:
  default_top_k: 10
  reciprocal_rank_k: 60

rag:
  simple:
    default_model: "llama-3.3-70b-versatile"
    default_temperature: 0
    default_top_k: 3

  agentic:
    default_model: "llama-3.3-70b-versatile"
    default_temperature: 0
    recursion_limit: 25

prompts:
  grade: |
    You are an expert document relevance grader. Your task is to determine whether retrieved documents contain information that can help answer the user's question.

    Retrieved Document:
    {context}

    User Question: {question}

    Evaluation Criteria:
    - Mark as 'yes' if the document contains specific facts, concepts, or information directly related to the question
    - Mark as 'yes' if the document contains partial information that contributes to answering the question
    - Mark as 'no' only if the document is completely unrelated or contains no useful information
    - Be generous in marking as relevant - it's better to include potentially useful information than to miss it

    Provide ONLY a binary score: 'yes' if relevant, 'no' if not relevant.

  rewrite: |
    The initial search did not retrieve sufficiently relevant documents for the user's question. Your task is to reformulate the question to improve search effectiveness.

    Original Question: {question}

    Instructions for rewriting:
    1. Identify the core concepts and intent behind the question
    2. Consider alternative keywords, synonyms, or phrasings that might appear in relevant documents
    3. Make the question more specific if it was too broad, or more general if it was too narrow
    4. Focus on terms that are likely to appear in academic or technical documents

    Rewritten Question:

  generate: |
    You are a knowledgeable assistant providing accurate, evidence-based answers. Use the retrieved context to answer the user's question comprehensively yet concisely.

    Question: {question}

    Retrieved Context:
    {context}

    Instructions:
    1. Answer directly based on the provided context
    2. If the context contains the answer, provide it clearly and concisely
    3. If the context only partially answers the question, provide what you can and note what's missing
    4. If the context doesn't contain relevant information, state that clearly
    5. Keep your response focused and under 4 sentences
    6. Cite specific details from the context when possible

    Answer:

  simple_rag_system: |
    You are a helpful AI assistant. Use the following context to answer the user's question.
    If you cannot find the answer in the context, say so.

    Context:
    {context}

gradio:
  server:
    name: "127.0.0.1"
    port: 7861
    share: false

  ui:
    theme: "soft"
    title: "Agentic RAG System"

  defaults:
    chunk_size: 512
    chunk_size_range: [128, 1024, 128]  # [min, max, step]
    temperature: 0
    temperature_range: [0, 1, 0.1]  # [min, max, step]
    top_k: 3
    top_k_range: [1, 20, 1]  # [min, max, step]
    search_top_k: 10
    search_top_k_range: [5, 50, 5]  # [min, max, step]

cli:
  defaults:
    chunks_file: "data/processed/annotated_chunks.jsonl"
    vectors_file: "data/vectors/214.pkl"
    eval_setup: "simple"
    recursion_limit: 25
